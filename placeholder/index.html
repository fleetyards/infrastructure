<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>FleetYards — Staging Offline</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="apple-touch-icon" href="favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Open+Sans:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #000;
        --text: #c8c8c8;
        --muted: #7a8288;
        --primary: #428bca;
        --gold: #d4af37;
        --panel-bg: rgba(39, 43, 48, 0.9);
        --panel-border: rgba(200, 200, 200, 0.15);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Open Sans", -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        background-image:
          radial-gradient(
            circle at 20% 30%,
            rgba(66, 139, 202, 0.12),
            transparent 40%
          ),
          radial-gradient(
            circle at 80% 70%,
            rgba(212, 175, 55, 0.06),
            transparent 40%
          );
      }

      .panel {
        max-width: 560px;
        width: 100%;
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
        border-radius: 16px;
        padding: 3rem 2.5rem;
        text-align: center;
        backdrop-filter: blur(8px);
      }

      .logo {
        width: 160px;
        height: auto;
        margin: 0 auto 1.5rem;
        display: block;
        color: var(--primary);
        filter: drop-shadow(0 4px 24px rgba(66, 139, 202, 0.35));
      }

      .badge {
        display: inline-block;
        font-family: "Orbitron", sans-serif;
        font-size: 0.7rem;
        font-weight: 500;
        letter-spacing: 0.25em;
        color: var(--gold);
        border: 1px solid var(--gold);
        border-radius: 999px;
        padding: 0.4rem 1rem;
        text-transform: uppercase;
        margin-bottom: 1.75rem;
      }

      h1 {
        font-family: "Orbitron", sans-serif;
        font-weight: 700;
        font-size: clamp(1.5rem, 4vw, 2.15rem);
        letter-spacing: 0.04em;
        margin: 0 0 1rem;
        color: #fff;
      }

      p {
        font-size: 1rem;
        line-height: 1.6;
        color: var(--text);
        margin: 0 0 1.5rem;
      }

      a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
      }

      a:hover {
        text-decoration: underline;
      }

      .footer {
        margin-top: 2rem;
        font-size: 0.8rem;
        color: var(--muted);
        font-family: "Orbitron", sans-serif;
        letter-spacing: 0.15em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <img src="favicon.png" alt="FleetYards" class="logo" />
      <span class="badge">Staging</span>
      <h1>Environment Offline</h1>
      <p>
        The FleetYards staging environment is currently offline. Production
        remains available at
        <a href="https://fleetyards.net">fleetyards.net</a>.
      </p>
      <div class="footer">FleetYards</div>
    </main>
  </body>
</html>
