name: Deploy

on:
  workflow_run:
    workflows: ["Test"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        required: true
        type: choice
        options:
          - stage
          - live

jobs:
  stage:
    if: >
      (github.event_name == 'workflow_run'
        && github.event.workflow_run.conclusion == 'success'
        && github.event.workflow_run.event == 'push')
      || (github.event_name == 'workflow_dispatch' && inputs.target == 'stage')
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_hetzner_api_key: ${{ secrets.HETZNER_API_KEY_STAGE }}
      TF_VAR_ssh_key_name: ${{ secrets.HETZNER_SSH_KEY_NAME }}
      TF_VAR_github_username: ${{ secrets.USERNAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Remove encrypted variable files
        run: rm -f *.tfvars

      - name: Init
        run: terraform init

      - name: Select workspace
        run: terraform workspace select stage

      - name: Plan
        run: terraform plan -out=tfplan

      - name: Apply
        run: terraform apply tfplan

  live:
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'live'
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_hetzner_api_key: ${{ secrets.HETZNER_API_KEY }}
      TF_VAR_ssh_key_name: ${{ secrets.HETZNER_SSH_KEY_NAME }}
      TF_VAR_github_username: ${{ secrets.USERNAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Remove encrypted variable files
        run: rm -f *.tfvars

      - name: Init
        run: terraform init

      - name: Select workspace
        run: terraform workspace select live

      - name: Plan
        run: terraform plan -out=tfplan

      - name: Apply
        run: terraform apply tfplan
