name: Deploy

on:
  workflow_run:
    workflows: ["Test"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        required: true
        type: choice
        options:
          - stage
          - live

jobs:
  stage:
    if: >
      (github.event_name == 'workflow_run'
        && github.event.workflow_run.conclusion == 'success'
        && github.event.workflow_run.event == 'push')
      || (github.event_name == 'workflow_dispatch' && inputs.target == 'stage')
    runs-on: ubuntu-latest
    environment: Stage
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_hetzner_api_key: ${{ secrets.HETZNER_API_KEY_STAGE }}
      TF_VAR_ssh_key_name: ${{ secrets.HETZNER_SSH_KEY_NAME }}
      TF_VAR_github_username: ${{ secrets.USERNAME }}
      TF_VAR_deploy_ssh_public_key: ${{ secrets.DEPLOY_SSH_PUBLIC_KEY }}
      DNSIMPLE_TOKEN: ${{ secrets.DNSIMPLE_TOKEN }}
      DNSIMPLE_ACCOUNT: ${{ secrets.DNSIMPLE_ACCOUNT }}
      TF_VAR_bunny_api_key: ${{ secrets.BUNNY_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Remove encrypted variable files
        run: rm -f *.tfvars

      - name: Init
        run: terraform init

      - name: Select workspace
        run: terraform workspace select stage

      - name: Plan
        run: terraform plan -out=tfplan

      - name: Apply
        run: terraform apply tfplan

  live-plan:
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'live'
    runs-on: ubuntu-latest
    environment: Live Plan
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_hetzner_api_key: ${{ secrets.HETZNER_API_KEY }}
      TF_VAR_ssh_key_name: ${{ secrets.HETZNER_SSH_KEY_NAME }}
      TF_VAR_github_username: ${{ secrets.USERNAME }}
      TF_VAR_deploy_ssh_public_key: ${{ secrets.DEPLOY_SSH_PUBLIC_KEY }}
      DNSIMPLE_TOKEN: ${{ secrets.DNSIMPLE_TOKEN }}
      DNSIMPLE_ACCOUNT: ${{ secrets.DNSIMPLE_ACCOUNT }}
      TF_VAR_bunny_api_key: ${{ secrets.BUNNY_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Remove encrypted variable files
        run: rm -f *.tfvars

      - name: Init
        run: terraform init

      - name: Select workspace
        run: terraform workspace select live

      - name: Plan
        run: terraform plan -out=tfplan

      - name: Check for destructive changes
        run: |
          terraform show -json tfplan > plan.json
          DESTROYS=$(jq '[.resource_changes[]? | select(.change.actions | contains(["delete"]))] | length' plan.json)
          REPLACES=$(jq '[.resource_changes[]? | select(.change.actions | contains(["delete", "create"]))] | length' plan.json)
          echo "Resources to destroy: $DESTROYS"
          echo "Resources to replace: $REPLACES"
          if [ "$DESTROYS" -gt 0 ] || [ "$REPLACES" -gt 0 ]; then
            echo "::error::Plan contains destructive changes ($DESTROYS destroys, $REPLACES replacements). Live deploy blocked."
            exit 1
          fi

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: live-tfplan
          path: tfplan

  live-apply:
    needs: live-plan
    runs-on: ubuntu-latest
    environment: Live
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_hetzner_api_key: ${{ secrets.HETZNER_API_KEY }}
      TF_VAR_ssh_key_name: ${{ secrets.HETZNER_SSH_KEY_NAME }}
      TF_VAR_github_username: ${{ secrets.USERNAME }}
      TF_VAR_deploy_ssh_public_key: ${{ secrets.DEPLOY_SSH_PUBLIC_KEY }}
      DNSIMPLE_TOKEN: ${{ secrets.DNSIMPLE_TOKEN }}
      DNSIMPLE_ACCOUNT: ${{ secrets.DNSIMPLE_ACCOUNT }}
      TF_VAR_bunny_api_key: ${{ secrets.BUNNY_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Remove encrypted variable files
        run: rm -f *.tfvars

      - name: Init
        run: terraform init

      - name: Select workspace
        run: terraform workspace select live

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: live-tfplan

      - name: Apply
        run: terraform apply tfplan
