name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  terraform_test:
    runs-on: ubuntu-latest
    env:
      TF_VAR_ssh_key_name: ${{ secrets.HETZNER_SSH_KEY_NAME }}
      TF_VAR_github_username: ${{ secrets.USERNAME }}
      TF_VAR_hetzner_api_key: ${{ secrets.HETZNER_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Remove Existing Terraform Variables File
        run: rm -f terraform.tfvars

      - name: Init
        run: terraform init

      - name: Validate
        run: terraform validate

      - name: Test
        run: terraform test
