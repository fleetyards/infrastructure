name: Destroy

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Environment to destroy"
        required: true
        type: choice
        options:
          - stage
      confirm:
        description: "Type 'destroy' to confirm"
        required: true
        type: string

jobs:
  destroy:
    if: inputs.confirm == 'destroy'
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_hetzner_api_key: ${{ inputs.target == 'stage' && secrets.HETZNER_API_KEY_STAGE || secrets.HETZNER_API_KEY }}
      TF_VAR_ssh_key_name: ${{ secrets.HETZNER_SSH_KEY_NAME }}
      TF_VAR_github_username: ${{ secrets.USERNAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Remove encrypted variable files
        run: rm -f *.tfvars

      - name: Init
        run: terraform init

      - name: Select workspace
        run: terraform workspace select ${{ inputs.target }}

      - name: Destroy
        run: terraform destroy -auto-approve
